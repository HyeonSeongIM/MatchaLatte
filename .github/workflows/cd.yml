name: CD

on:
  push:
    branches:
      - 'main'
      - 'develop'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service_name: api-service
            context_dir: core/core-api
            gradle_module: core:core-api
          - service_name: admin-service
            context_dir: admin
            gradle_module: admin
          - service_name: multicast-service
            context_dir: multicast-server
            gradle_module: multicast-server


    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradle
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean :${{ matrix.gradle_module }}:bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context_dir }}
          file: ./${{ matrix.context_dir }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_ID }}/${{ matrix.service_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker compose ps